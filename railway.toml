[build]
builder = "NIXPACKS"
buildCommand = "npm run generate && npm run build && if [ \"$RAILWAY_ENVIRONMENT_NAME\" != \"production\" ] && [ -n \"$B2_KEY_ID\" ]; then npm run fetch-prod-db && cp db/anonymised_prod.db db/catalyse.db; fi"

[deploy]
startCommand = "npm start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.healthcheck]
path = "/api/health"
interval = 300
timeout = 5
