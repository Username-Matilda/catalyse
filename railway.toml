[build]
builder = "NIXPACKS"
buildCommand = "python build.py && npm install --prefix web && npx --prefix web prisma generate && npm run build --prefix web"

[deploy]
startCommand = "bash start.sh"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.healthcheck]
path = "/api/skills"
interval = 300
timeout = 5
