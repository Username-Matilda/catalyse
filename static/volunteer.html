<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Profile - Catalyse</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <header>
        <div class="container">
            <a href="/" class="logo">Catalyse <img src="/static/images/pauseai-logo.png" alt="PauseAI"></a>
            <nav>
                <a href="/">All Projects</a>
                <a href="/static/volunteers.html" class="active">Volunteers</a>
                <a href="/static/suggest.html">Suggest Project</a>
                <a href="/static/starter-tasks.html">Starter Tasks</a>
            </nav>
            <div class="nav-auth" id="authNav"></div>
        </div>
    </header>

    <main class="container page">
        <div id="loadingState" class="loading">
            <div class="spinner"></div>
            Loading profile...
        </div>

        <div id="profileContent" style="display: none;">
            <div style="margin-bottom: 20px;">
                <a href="/static/volunteers.html" style="color: var(--text-light);">&larr; Back to Volunteers</a>
            </div>

            <div id="messageDiv" class="message" style="display: none;"></div>

            <div class="card">
                <div class="card-header">
                    <h1 id="volunteerName" style="margin: 0;"></h1>
                </div>

                <div id="volunteerLocation" style="color: var(--text-light); margin-bottom: 16px;"></div>

                <div id="volunteerBio" style="white-space: pre-wrap; margin-bottom: 20px;"></div>

                <h3>Skills</h3>
                <div id="volunteerSkills" class="skills" style="margin-bottom: 20px;"></div>

                <div id="otherSkills" style="display: none; margin-bottom: 20px;">
                    <h4 style="color: var(--text-light);">Other Skills</h4>
                    <p id="otherSkillsText"></p>
                </div>

                <div class="grid grid-2" style="margin-top: 20px;">
                    <div id="availabilitySection" style="display: none;">
                        <h4 style="color: var(--text-light);">Availability</h4>
                        <p id="availabilityText"></p>
                    </div>
                    <div id="contactInfo" style="display: none;">
                        <h4 style="color: var(--text-light);">Contact</h4>
                        <div id="contactDetails"></div>
                    </div>
                </div>
            </div>

            <!-- Track Record -->
            <div id="endorsementsSection" class="card" style="display: none;">
                <h2>Verified Skills</h2>
                <p style="color: var(--text-light); margin-bottom: 12px;">Skills verified through completed work on the platform.</p>
                <div id="endorsementsList" class="skills"></div>
            </div>

            <div id="completedTasksSection" class="card" style="display: none;">
                <h2>Completed Starter Tasks</h2>
                <div id="completedTasksList"></div>
            </div>

            <div id="projectsSection" class="card" style="display: none;">
                <h2>Project History</h2>
                <div id="volunteerProjects"></div>
            </div>
        </div>
    </main>


    <script src="/static/app.js"></script>
    <script>
        let volunteer = null;
        let currentUser = null;

        async function init() {
            currentUser = await initAuthNav();
            if (!currentUser) {
                window.location.href = '/static/login.html';
                return;
            }

            const volunteerId = getQueryParam('id');
            if (!volunteerId) {
                window.location.href = '/static/volunteers.html';
                return;
            }

            await loadVolunteer(volunteerId);
        }

        async function loadVolunteer(volunteerId) {
            try {
                volunteer = await apiRequest(`/api/volunteers/${volunteerId}`);
                renderProfile();
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('profileContent').style.display = 'block';
            } catch (error) {
                showMessage(error.message, 'error');
                document.getElementById('loadingState').innerHTML = `
                    <p style="color: var(--error);">Volunteer not found.</p>
                    <a href="/static/volunteers.html" class="btn btn-secondary" style="margin-top: 16px;">Back to Volunteers</a>
                `;
            }
        }

        function renderProfile() {
            document.title = `${volunteer.name} - Catalyse`;

            document.getElementById('volunteerName').textContent = volunteer.name;

            const locationParts = [];
            if (volunteer.location) locationParts.push(volunteer.location);
            if (volunteer.local_group) locationParts.push(volunteer.local_group);
            if (locationParts.length > 0) {
                document.getElementById('volunteerLocation').textContent = locationParts.join(' · ');
            }

            if (volunteer.bio) {
                document.getElementById('volunteerBio').textContent = volunteer.bio;
            } else {
                document.getElementById('volunteerBio').innerHTML = '<em style="color: var(--text-light);">No bio provided</em>';
            }

            // Skills (with endorsement indicators)
            const endorsedSkillIds = new Set((volunteer.endorsements || []).map(e => e.skill_id));
            if (volunteer.skills && volunteer.skills.length > 0) {
                document.getElementById('volunteerSkills').innerHTML = volunteer.skills.map(s => {
                    const endorsed = endorsedSkillIds.has(s.id);
                    return `<span class="skill-tag${endorsed ? ' matched' : ''}">${escapeHtml(s.name)}${endorsed ? ' &#10003;' : ''}</span>`;
                }).join('');
            } else {
                document.getElementById('volunteerSkills').innerHTML = '<em style="color: var(--text-light);">No skills listed</em>';
            }

            // Other skills
            if (volunteer.other_skills) {
                document.getElementById('otherSkills').style.display = 'block';
                document.getElementById('otherSkillsText').textContent = volunteer.other_skills;
            }

            // Availability
            if (volunteer.availability_hours_per_week) {
                document.getElementById('availabilitySection').style.display = 'block';
                document.getElementById('availabilityText').textContent = `${volunteer.availability_hours_per_week} hours/week`;
            }

            // Contact info (only shown if they opted to share directly)
            if (volunteer.email || volunteer.discord_handle || volunteer.signal_number || volunteer.whatsapp_number) {
                document.getElementById('contactInfo').style.display = 'block';
                let contactHtml = [];
                if (volunteer.email) contactHtml.push(`Email: ${escapeHtml(volunteer.email)}`);
                if (volunteer.discord_handle) contactHtml.push(`Discord: ${escapeHtml(volunteer.discord_handle)}`);
                if (volunteer.signal_number) contactHtml.push(`Signal: ${escapeHtml(volunteer.signal_number)}`);
                if (volunteer.whatsapp_number) contactHtml.push(`WhatsApp: ${escapeHtml(volunteer.whatsapp_number)}`);
                if (volunteer.contact_notes) contactHtml.push(`<em>${escapeHtml(volunteer.contact_notes)}</em>`);
                document.getElementById('contactDetails').innerHTML = contactHtml.join('<br>');
            }

            // Verified skill endorsements
            if (volunteer.endorsements && volunteer.endorsements.length > 0) {
                document.getElementById('endorsementsSection').style.display = 'block';
                document.getElementById('endorsementsList').innerHTML = volunteer.endorsements.map(e => {
                    const color = e.rating === 'strong' ? 'var(--success)' : 'var(--secondary)';
                    return `<span class="skill-tag" style="border-left: 3px solid ${color};">${escapeHtml(e.skill_name)} <small style="color: ${color};">${e.rating}</small></span>`;
                }).join('');
            }

            // Completed starter tasks
            if (volunteer.completed_tasks && volunteer.completed_tasks.length > 0) {
                document.getElementById('completedTasksSection').style.display = 'block';
                document.getElementById('completedTasksList').innerHTML = volunteer.completed_tasks.map(t => `
                    <div style="padding: 12px 0; border-bottom: 1px solid var(--border);">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <strong>${escapeHtml(t.title)}</strong>
                            <span style="font-size: 0.875rem; font-weight: 500; color: ${t.review_rating === 'excellent' ? 'var(--success)' : 'var(--secondary)'};">
                                ${t.review_rating}
                            </span>
                        </div>
                        ${t.skill_name ? `<span class="skill-tag" style="margin-top: 4px;">${escapeHtml(t.skill_name)}</span>` : ''}
                        ${t.feedback_to_volunteer ? `<p style="margin-top: 8px; font-size: 0.875rem; color: var(--text-light); font-style: italic;">"${escapeHtml(t.feedback_to_volunteer)}"</p>` : ''}
                        ${t.reviewed_at ? `<p style="font-size: 0.75rem; color: var(--text-light); margin-top: 4px;">${formatDate(t.reviewed_at)}</p>` : ''}
                    </div>
                `).join('');
            }

            // Project history
            if (volunteer.projects && volunteer.projects.length > 0) {
                document.getElementById('projectsSection').style.display = 'block';
                document.getElementById('volunteerProjects').innerHTML = volunteer.projects.map(p => `
                    <div style="padding: 12px 0; border-bottom: 1px solid var(--border);">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <a href="/static/project.html?id=${p.id}" style="font-weight: 600; color: var(--primary-dark);">
                                ${escapeHtml(p.title)}
                            </a>
                            <span class="status-badge status-${p.status}">${formatStatus(p.status)}</span>
                        </div>
                        <p style="font-size: 0.875rem; color: var(--text-light); margin-top: 4px;">
                            ${p.role === 'owner' ? 'Project owner' : 'Proposer'}
                            ${p.outcome ? ` · Outcome: ${p.outcome}` : ''}
                        </p>
                    </div>
                `).join('');
            }
        }

        init();
    </script>
</body>
</html>
