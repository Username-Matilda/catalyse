<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Catalyse</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <header>
        <div class="container">
            <a href="/" class="logo"><img src="/static/images/pauseai-logo.png" alt="PauseAI"> Catalyse</a>
            <nav>
                <a href="/">Projects</a>
                <a href="/static/volunteers.html">Volunteers</a>
            </nav>
            <div class="nav-auth">
                <a href="/static/login.html" class="btn btn-outline">Login</a>
            </div>
        </div>
    </header>

    <main class="container page">
        <div style="max-width: 400px; margin: 60px auto;">
            <h1 style="text-align: center;">Set New Password</h1>
            <p style="text-align: center; color: var(--text-light); margin-bottom: 32px;">
                Choose a new password for your account.
            </p>

            <div id="messageDiv" class="message" style="display: none;"></div>

            <form id="resetForm" class="card">
                <div class="form-group">
                    <label for="password" class="required">New Password</label>
                    <input type="password" id="password" name="password" required minlength="8" placeholder="At least 8 characters" autofocus>
                </div>

                <div class="form-group">
                    <label for="password_confirm" class="required">Confirm Password</label>
                    <input type="password" id="password_confirm" name="password_confirm" required minlength="8" placeholder="Type your password again">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    Reset Password
                </button>
            </form>

            <div id="successState" style="display: none;" class="card">
                <div style="text-align: center;">
                    <h3 style="color: var(--success);">Password Reset!</h3>
                    <p style="margin: 16px 0; color: var(--text-light);">
                        Your password has been changed. You can now log in.
                    </p>
                    <a href="/static/login.html" class="btn btn-primary">Go to Login</a>
                </div>
            </div>

            <div id="errorState" style="display: none;" class="card">
                <div style="text-align: center;">
                    <h3 style="color: var(--error);">Invalid Link</h3>
                    <p style="margin: 16px 0; color: var(--text-light);">
                        This reset link is invalid or has expired. Please request a new one.
                    </p>
                    <a href="/static/forgot-password.html" class="btn btn-outline">Request New Link</a>
                </div>
            </div>
        </div>
    </main>

    <script src="/static/app.js"></script>
    <script>
        const token = getQueryParam('token');

        if (!token) {
            document.getElementById('resetForm').style.display = 'none';
            document.getElementById('errorState').style.display = 'block';
        }

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const form = e.target;

            // Validate passwords match
            if (form.password.value !== form.password_confirm.value) {
                showMessage('Passwords do not match', 'error');
                return;
            }

            if (form.password.value.length < 8) {
                showMessage('Password must be at least 8 characters', 'error');
                return;
            }

            const submitBtn = form.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Resetting...';

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: token,
                        new_password: form.password.value
                    })
                });

                const result = await response.json();

                if (!response.ok) {
                    if (response.status === 400) {
                        form.style.display = 'none';
                        document.getElementById('errorState').style.display = 'block';
                        return;
                    }
                    throw new Error(result.detail || 'Reset failed');
                }

                form.style.display = 'none';
                document.getElementById('successState').style.display = 'block';

            } catch (error) {
                showMessage(error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Reset Password';
            }
        });
    </script>
</body>
</html>
