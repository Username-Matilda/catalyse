<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalyse - PauseAI UK Projects</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <header>
        <div class="container">
            <a href="/" class="logo">Catalyse <img src="/static/images/pauseai-logo.png" alt="PauseAI"></a>
            <nav>
                <a href="/" class="active">All Projects</a>
                <a href="/static/volunteers.html">Volunteers</a>
                <a href="/static/suggest.html">Suggest Project</a>
                <a href="/static/starter-tasks.html">Starter Tasks</a>
            </nav>
            <div class="nav-auth" id="authNav">
                <!-- Filled by JS -->
            </div>
        </div>
    </header>

    <main class="container page">
        <div class="section-header">
            <h1>Projects</h1>
        </div>

        <div class="filters" id="filters">
            <div class="filter-group">
                <label for="searchInput">Search</label>
                <input type="text" id="searchInput" placeholder="Search projects...">
            </div>
            <div class="filter-group">
                <label for="statusFilter">Status</label>
                <select id="statusFilter">
                    <option value="">All Active</option>
                    <option value="in_progress">In Progress</option>
                    <option value="on_hold">On Hold</option>
                    <option value="completed">Completed</option>
                    <option value="archived">Archived</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="seekingFilter">Needs</label>
                <select id="seekingFilter">
                    <option value="">Any</option>
                    <option value="seeking">Looking for People</option>
                    <option value="seeking_help">Seeking Help</option>
                    <option value="seeking_owner">Seeking Owner</option>
                    <option value="not_seeking">Not Seeking</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="urgencyFilter">Urgency</label>
                <select id="urgencyFilter">
                    <option value="">Any</option>
                    <option value="high">High</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Location</label>
                <div class="location-filter" id="locationFilter"></div>
            </div>
            <div class="filter-group">
                <label for="sortFilter">Sort By</label>
                <select id="sortFilter">
                    <option value="created_at">Newest</option>
                    <option value="urgency">Urgency</option>
                    <option value="match">Best Match</option>
                </select>
            </div>
            <div class="filter-group filter-group-clear">
                <button type="button" class="btn btn-small btn-ghost" id="clearFiltersBtn" onclick="clearFilters()">Clear filters</button>
            </div>
        </div>

        <div id="adminBanner" style="display: none; margin-bottom: 16px;"></div>

        <div id="statusSummary" style="display: none; margin-bottom: 20px;">
            <div style="display: flex; flex-wrap: wrap; gap: 8px; align-items: center;"></div>
        </div>

        <div id="messageDiv" class="message" style="display: none;"></div>

        <div id="projectsList">
            <div class="loading">
                <div class="spinner"></div>
                Loading projects...
            </div>
        </div>

        <div id="emptyState" class="empty-state" style="display: none;">
            <h3>No projects found</h3>
            <p>Try adjusting your filters or check back later.</p>
            <a href="/static/suggest.html" class="btn btn-primary">Suggest a Project</a>
        </div>
    </main>

    <script src="/static/app.js"></script>
    <script>
        let allProjects = [];
        let currentUser = null;
        let locationFilter = null;

        async function init() {
            currentUser = await initAuthNav();
            if (!currentUser) {
                window.location.href = '/static/login.html';
                return;
            }
            if (currentUser.is_admin) await loadAdminBanner();
            locationFilter = createLocationFilter('locationFilter', loadProjects);
            restoreFiltersFromURL();
            await loadProjects();
            setupFilters();
        }

        function restoreFiltersFromURL() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('status')) document.getElementById('statusFilter').value = params.get('status');
            if (params.get('seeking')) document.getElementById('seekingFilter').value = params.get('seeking');
            if (params.get('urgency')) document.getElementById('urgencyFilter').value = params.get('urgency');
            if (params.get('country') || params.get('local_group'))
                locationFilter.setValue(params.get('country') || '', params.get('local_group') || '');
            if (params.get('search')) document.getElementById('searchInput').value = params.get('search');
            if (params.get('sort_by')) document.getElementById('sortFilter').value = params.get('sort_by');
        }

        function saveFiltersToURL() {
            const params = new URLSearchParams();
            const status = document.getElementById('statusFilter').value;
            const seeking = document.getElementById('seekingFilter').value;
            const urgency = document.getElementById('urgencyFilter').value;
            const { country, localGroup } = locationFilter.getValue();
            const search = document.getElementById('searchInput').value;
            const sortBy = document.getElementById('sortFilter').value;
            if (status) params.set('status', status);
            if (seeking) params.set('seeking', seeking);
            if (urgency) params.set('urgency', urgency);
            if (country) params.set('country', country);
            if (localGroup) params.set('local_group', localGroup);
            if (search) params.set('search', search);
            if (sortBy && sortBy !== 'created_at') params.set('sort_by', sortBy);
            const newUrl = params.toString() ? `?${params}` : window.location.pathname;
            history.replaceState(null, '', newUrl);
        }

        async function loadAdminBanner() {
            try {
                const stats = await apiRequest('/api/admin/stats');
                const banner = document.getElementById('adminBanner');
                const alerts = [];

                if (stats.projects.pending_review > 0) {
                    alerts.push(`
                        <div class="message info" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                            <span><strong>${stats.projects.pending_review}</strong> project${stats.projects.pending_review > 1 ? 's' : ''} awaiting review</span>
                            <a href="/static/admin/triage.html" class="btn btn-small btn-primary">Review</a>
                        </div>
                    `);
                }

                if (stats.interests && stats.interests.pending > 0) {
                    alerts.push(`
                        <div class="message info" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                            <span><strong>${stats.interests.pending}</strong> pending volunteer interest${stats.interests.pending > 1 ? 's' : ''} — any admin can accept or decline</span>
                            <a href="/static/admin/triage.html#interests" class="btn btn-small btn-primary">Triage</a>
                        </div>
                    `);
                }

                if (alerts.length > 0) {
                    banner.style.display = 'block';
                    banner.innerHTML = alerts.join('');
                }
            } catch (e) { /* not admin or error, ignore */ }
        }

        async function loadProjects() {
            saveFiltersToURL();
            try {
                const params = new URLSearchParams();
                const status = document.getElementById('statusFilter').value;
                const urgency = document.getElementById('urgencyFilter').value;
                const { country, localGroup } = locationFilter.getValue();
                const search = document.getElementById('searchInput').value;
                const sortBy = document.getElementById('sortFilter').value;

                if (status) params.set('status', status);
                if (urgency) params.set('urgency', urgency);
                if (country) params.set('country', country);
                if (localGroup) params.set('local_group', localGroup);
                if (search) params.set('search', search);
                if (sortBy) params.set('sort_by', sortBy);

                const data = await apiRequest(`/api/projects?${params}`);
                allProjects = data.projects;
                renderProjects();
            } catch (error) {
                showMessage('Failed to load projects', 'error');
            }
        }

        function renderProjects() {
            const container = document.getElementById('projectsList');
            const emptyState = document.getElementById('emptyState');
            const summaryBar = document.getElementById('statusSummary');

            // Apply client-side seeking filter
            const seekingFilter = document.getElementById('seekingFilter').value;
            let filteredProjects = allProjects;
            if (seekingFilter === 'seeking') {
                filteredProjects = allProjects.filter(p => p.is_seeking_help || p.is_seeking_owner);
            } else if (seekingFilter === 'seeking_help') {
                filteredProjects = allProjects.filter(p => p.is_seeking_help);
            } else if (seekingFilter === 'seeking_owner') {
                filteredProjects = allProjects.filter(p => p.is_seeking_owner);
            } else if (seekingFilter === 'not_seeking') {
                filteredProjects = allProjects.filter(p => !p.is_seeking_help && !p.is_seeking_owner);
            }

            if (filteredProjects.length === 0) {
                container.innerHTML = '';
                summaryBar.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';

            // Summary bar
            const statusFilter = document.getElementById('statusFilter').value;
            if (!statusFilter && !seekingFilter) {
                summaryBar.style.display = 'block';
                const seekingCount = filteredProjects.filter(p => p.is_seeking_help || p.is_seeking_owner).length;
                const inProgressCount = filteredProjects.filter(p => !p.is_seeking_help && !p.is_seeking_owner && p.status === 'in_progress').length;
                const badges = [];
                if (seekingCount) badges.push(`<span class="status-badge status-seeking_help" style="font-size: 0.8rem; padding: 6px 14px;">Looking for People: ${seekingCount}</span>`);
                if (inProgressCount) badges.push(`<span class="status-badge status-in_progress" style="font-size: 0.8rem; padding: 6px 14px;">In Progress: ${inProgressCount}</span>`);
                badges.push(`<span style="color: var(--text-light); font-size: 0.875rem; margin-left: 4px;">${filteredProjects.length} total</span>`);
                summaryBar.querySelector('div').innerHTML = badges.join('');
            } else {
                summaryBar.style.display = 'none';
            }

            // Group projects: seeking first, then by lifecycle status
            if (!statusFilter && !seekingFilter) {
                const seeking = filteredProjects.filter(p => p.is_seeking_help || p.is_seeking_owner);
                const inProgress = filteredProjects.filter(p => !p.is_seeking_help && !p.is_seeking_owner && p.status === 'in_progress');
                const onHold = filteredProjects.filter(p => !p.is_seeking_help && !p.is_seeking_owner && p.status === 'on_hold');
                const completed = filteredProjects.filter(p => p.status === 'completed');
                const other = filteredProjects.filter(p =>
                    !p.is_seeking_help && !p.is_seeking_owner &&
                    !['in_progress', 'on_hold', 'completed'].includes(p.status) &&
                    !seeking.includes(p)
                );

                const groups = [
                    { projects: seeking, label: 'Looking for People', badgeClass: 'seeking_help', desc: 'These projects need your help' },
                    { projects: inProgress, label: 'In Progress', badgeClass: 'in_progress', desc: 'Actively being worked on' },
                    { projects: other, label: 'Other Active', badgeClass: 'on_hold', desc: '' },
                    { projects: onHold, label: 'On Hold', badgeClass: 'on_hold', desc: '' },
                    { projects: completed, label: 'Completed', badgeClass: 'completed', desc: '' }
                ];

                let html = '';
                for (const group of groups) {
                    if (group.projects.length === 0) continue;
                    html += `
                        <div style="margin-bottom: 32px;">
                            <h2 style="font-family: var(--font-heading); margin-bottom: 4px; display: flex; align-items: center; gap: 8px;">
                                <span class="status-badge status-${group.badgeClass}">${group.label}</span>
                                <span style="color: var(--text-light); font-size: 0.875rem; font-weight: normal;">${group.projects.length} project${group.projects.length > 1 ? 's' : ''}</span>
                            </h2>
                            ${group.desc ? `<p style="color: var(--text-light); font-size: 0.875rem; margin-bottom: 12px;">${group.desc}</p>` : '<div style="margin-bottom: 12px;"></div>'}
                            <div class="grid grid-3">
                                ${group.projects.map(project => renderProjectCard(project)).join('')}
                            </div>
                        </div>
                    `;
                }
                container.innerHTML = html;
            } else {
                // Filtered view — flat grid
                container.innerHTML = `<div class="grid grid-3">${filteredProjects.map(project => renderProjectCard(project)).join('')}</div>`;
            }
        }

        function renderProjectCard(project) {
            return `
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">
                            <a href="/static/project.html?id=${project.id}">${escapeHtml(project.title)}</a>
                        </h3>
                        <div style="display: flex; gap: 4px; flex-wrap: wrap;">
                            ${!['seeking_owner', 'seeking_help'].includes(project.status) ? `<span class="status-badge status-${project.status}">${formatStatus(project.status)}</span>` : ''}
                            ${project.is_seeking_help ? '<span class="status-badge status-seeking_help">Seeking Help</span>' : ''}
                            ${project.is_seeking_owner ? '<span class="status-badge status-seeking_owner">Seeking Owner</span>' : ''}
                        </div>
                    </div>
                    <div class="card-meta">
                        ${project.is_org_proposed ? '<span class="org-badge">PauseAI</span>' : ''}
                        ${project.local_group ? `<span class="org-badge" style="background: var(--secondary); color: white;">${escapeHtml(project.local_group)}</span>` : ''}
                        ${project.project_type ? ({'sprint':'Sprint','container':'Time-boxed','ongoing':'Ongoing','one_off':'One-off'}[project.project_type] || project.project_type) + ' · ' : ''}
                        ${project.owner ? `Owner: ${escapeHtml(project.owner.name)}` : 'No owner yet'}
                        ${project.time_commitment_hours_per_week ? ` · ${project.time_commitment_hours_per_week}h/week` : ''}
                        <span class="urgency urgency-${project.urgency}">· ${project.urgency} priority</span>
                    </div>
                    <p class="card-description">${escapeHtml(truncate(project.description, 150))}</p>
                    <div class="skills">
                        ${project.skills.map(skill => `
                            <span class="skill-tag ${getSkillClass(skill, project.match)}">${escapeHtml(skill.name)}</span>
                        `).join('')}
                    </div>
                    <div class="card-footer">
                        ${project.match ? `
                            <div class="match-score">
                                <div class="match-bar">
                                    <div class="match-bar-fill" style="width: ${project.match.required_match_percent}%"></div>
                                </div>
                                <span class="match-percent">${project.match.required_match_percent}% match</span>
                            </div>
                        ` : '<div></div>'}
                        <a href="/static/project.html?id=${project.id}" class="btn btn-small btn-secondary">View Details</a>
                    </div>
                </div>
            `;
        }

        function getSkillClass(skill, match) {
            if (!match || !currentUser) return skill.is_required ? 'required' : '';
            const userSkillIds = currentUser.skills?.map(s => s.id) || [];
            if (userSkillIds.includes(skill.id)) return 'matched';
            return skill.is_required ? 'unmatched' : '';
        }

        function formatStatus(status) {
            const labels = {
                'seeking_owner': 'Seeking Owner',
                'seeking_help': 'Seeking Help',
                'in_progress': 'In Progress',
                'on_hold': 'On Hold',
                'completed': 'Completed',
                'pending_review': 'Pending Review',
                'needs_discussion': 'Needs Discussion',
                'archived': 'Archived'
            };
            return labels[status] || status;
        }

        function truncate(text, length) {
            if (text.length <= length) return text;
            return text.substring(0, length) + '...';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function setupFilters() {
            let debounceTimer;
            const debouncedLoad = () => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(loadProjects, 300);
            };

            document.getElementById('searchInput').addEventListener('input', debouncedLoad);
            document.getElementById('statusFilter').addEventListener('change', loadProjects);
            document.getElementById('seekingFilter').addEventListener('change', () => { saveFiltersToURL(); renderProjects(); });
            document.getElementById('urgencyFilter').addEventListener('change', loadProjects);
            document.getElementById('sortFilter').addEventListener('change', loadProjects);
        }

        function showMessage(text, type) {
            const div = document.getElementById('messageDiv');
            div.textContent = text;
            div.className = `message ${type}`;
            div.style.display = 'flex';
            setTimeout(() => div.style.display = 'none', 5000);
        }

        function clearFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('statusFilter').value = '';
            document.getElementById('seekingFilter').value = '';
            document.getElementById('urgencyFilter').value = '';
            document.getElementById('sortFilter').value = 'created_at';
            locationFilter.setValue('', '');
            loadProjects();
        }

        init();
    </script>

    <footer style="border-top: 1px solid var(--border); padding: 24px 0; margin-top: 40px; text-align: center; color: var(--text-light); font-size: 0.875rem;">
        <div class="container">
            <a href="/static/privacy.html" style="color: var(--text-light); margin: 0 12px;">Privacy & Data</a> ·
            <a href="#" onclick="openBugReportModal(); return false;" style="color: var(--text-light); margin: 0 12px;">Report a Bug</a> ·
            <a href="mailto:matilda@pauseai.info" style="color: var(--text-light); margin: 0 12px;">Contact</a> ·
            <span style="margin: 0 12px;">PauseAI UK</span> ·
            <span id="version-sha" style="margin: 0 12px; font-family: monospace;"></span>
        </div>
    </footer>
    <script>
        fetch('/api/version').then(r => r.json()).then(d => {
            const el = document.getElementById('version-sha');
            if (d.sha && d.sha !== 'dev') {
                el.textContent = d.sha.slice(0, 7);
                el.title = d.sha;
            }
        }).catch(() => {});
    </script>
</body>
</html>
