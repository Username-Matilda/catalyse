<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalyse - PauseAI UK Projects</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <header>
        <div class="container">
            <a href="/" class="logo"><img src="/static/images/pauseai-logo.png" alt="PauseAI"> Catalyse</a>
            <nav>
                <a href="/" class="active">Projects</a>
                <a href="/static/volunteers.html">Volunteers</a>
                <a href="/static/suggest.html">Suggest Project</a>
            </nav>
            <div class="nav-auth" id="authNav">
                <!-- Filled by JS -->
            </div>
        </div>
    </header>

    <main class="container page">
        <div class="section-header">
            <h1>Projects</h1>
        </div>

        <div class="filters" id="filters">
            <div class="filter-group">
                <label for="searchInput">Search</label>
                <input type="text" id="searchInput" placeholder="Search projects...">
            </div>
            <div class="filter-group">
                <label for="statusFilter">Status</label>
                <select id="statusFilter">
                    <option value="">All Active</option>
                    <option value="seeking_owner">Seeking Owner</option>
                    <option value="seeking_help">Seeking Help</option>
                    <option value="in_progress">In Progress</option>
                    <option value="completed">Completed</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="urgencyFilter">Urgency</label>
                <select id="urgencyFilter">
                    <option value="">Any</option>
                    <option value="high">High</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="sortFilter">Sort By</label>
                <select id="sortFilter">
                    <option value="created_at">Newest</option>
                    <option value="urgency">Urgency</option>
                    <option value="match">Best Match</option>
                </select>
            </div>
        </div>

        <div id="messageDiv" class="message" style="display: none;"></div>

        <div id="projectsList" class="grid grid-2">
            <div class="loading">
                <div class="spinner"></div>
                Loading projects...
            </div>
        </div>

        <div id="emptyState" class="empty-state" style="display: none;">
            <h3>No projects found</h3>
            <p>Try adjusting your filters or check back later.</p>
            <a href="/static/suggest.html" class="btn btn-primary">Suggest a Project</a>
        </div>
    </main>

    <script src="/static/app.js"></script>
    <script>
        let allProjects = [];
        let currentUser = null;

        async function init() {
            await checkAuth();
            await loadProjects();
            setupFilters();
        }

        async function checkAuth() {
            const token = localStorage.getItem('authToken');
            if (token) {
                try {
                    const response = await fetch('/api/auth/me', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (response.ok) {
                        currentUser = await response.json();
                        renderAuthNav(true);
                        return;
                    }
                } catch (e) {
                    console.error('Auth check failed:', e);
                }
                localStorage.removeItem('authToken');
            }
            renderAuthNav(false);
        }

        function renderAuthNav(loggedIn) {
            const nav = document.getElementById('authNav');
            if (loggedIn) {
                nav.innerHTML = `
                    <a href="/static/dashboard.html" class="btn btn-ghost">Dashboard</a>
                    <div class="user-menu">
                        <button class="user-button" onclick="toggleUserMenu()">
                            ${currentUser.name}
                        </button>
                        <div class="user-dropdown" id="userDropdown">
                            <a href="/static/profile.html">My Profile</a>
                            <a href="/static/dashboard.html">Dashboard</a>
                            <a href="#" onclick="logout(); return false;">Logout</a>
                        </div>
                    </div>
                `;
            } else {
                nav.innerHTML = `
                    <a href="/static/login.html" class="btn btn-outline">Login</a>
                    <a href="/static/signup.html" class="btn btn-primary">Sign Up</a>
                `;
            }
        }

        function toggleUserMenu() {
            document.getElementById('userDropdown').classList.toggle('show');
        }

        async function logout() {
            const token = localStorage.getItem('authToken');
            if (token) {
                await fetch('/api/auth/logout', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
            }
            localStorage.removeItem('authToken');
            window.location.reload();
        }

        async function loadProjects() {
            const token = localStorage.getItem('authToken');
            const headers = token ? { 'Authorization': `Bearer ${token}` } : {};

            try {
                const params = new URLSearchParams();
                const status = document.getElementById('statusFilter').value;
                const urgency = document.getElementById('urgencyFilter').value;
                const search = document.getElementById('searchInput').value;
                const sortBy = document.getElementById('sortFilter').value;

                if (status) params.set('status', status);
                if (urgency) params.set('urgency', urgency);
                if (search) params.set('search', search);
                if (sortBy) params.set('sort_by', sortBy);

                const response = await fetch(`/api/projects?${params}`, { headers });
                const data = await response.json();
                allProjects = data.projects;
                renderProjects();
            } catch (error) {
                showMessage('Failed to load projects', 'error');
            }
        }

        function renderProjects() {
            const container = document.getElementById('projectsList');
            const emptyState = document.getElementById('emptyState');

            if (allProjects.length === 0) {
                container.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            container.innerHTML = allProjects.map(project => `
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">
                            <a href="/static/project.html?id=${project.id}">${escapeHtml(project.title)}</a>
                        </h3>
                        <span class="status-badge status-${project.status}">
                            ${formatStatus(project.status)}
                        </span>
                    </div>
                    <div class="card-meta">
                        ${project.is_org_proposed ? '<span class="org-badge">PauseAI</span>' : ''}
                        ${project.owner ? `Owner: ${escapeHtml(project.owner.name)}` : 'No owner yet'}
                        ${project.time_commitment_hours_per_week ? ` · ${project.time_commitment_hours_per_week}h/week` : ''}
                        <span class="urgency urgency-${project.urgency}">· ${project.urgency} priority</span>
                    </div>
                    <p class="card-description">${escapeHtml(truncate(project.description, 150))}</p>
                    <div class="skills">
                        ${project.skills.slice(0, 5).map(skill => `
                            <span class="skill-tag ${getSkillClass(skill, project.match)}">${escapeHtml(skill.name)}</span>
                        `).join('')}
                        ${project.skills.length > 5 ? `<span class="skill-tag">+${project.skills.length - 5} more</span>` : ''}
                    </div>
                    <div class="card-footer">
                        ${project.match ? `
                            <div class="match-score">
                                <div class="match-bar">
                                    <div class="match-bar-fill" style="width: ${project.match.required_match_percent}%"></div>
                                </div>
                                <span class="match-percent">${project.match.required_match_percent}% match</span>
                            </div>
                        ` : '<div></div>'}
                        <a href="/static/project.html?id=${project.id}" class="btn btn-small btn-secondary">View Details</a>
                    </div>
                </div>
            `).join('');
        }

        function getSkillClass(skill, match) {
            if (!match || !currentUser) return skill.is_required ? 'required' : '';
            const userSkillIds = currentUser.skills?.map(s => s.id) || [];
            if (userSkillIds.includes(skill.id)) return 'matched';
            return skill.is_required ? 'unmatched' : '';
        }

        function formatStatus(status) {
            const labels = {
                'seeking_owner': 'Seeking Owner',
                'seeking_help': 'Seeking Help',
                'in_progress': 'In Progress',
                'on_hold': 'On Hold',
                'completed': 'Completed',
                'pending_review': 'Pending Review',
                'needs_discussion': 'Needs Discussion'
            };
            return labels[status] || status;
        }

        function truncate(text, length) {
            if (text.length <= length) return text;
            return text.substring(0, length) + '...';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function setupFilters() {
            let debounceTimer;
            const debouncedLoad = () => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(loadProjects, 300);
            };

            document.getElementById('searchInput').addEventListener('input', debouncedLoad);
            document.getElementById('statusFilter').addEventListener('change', loadProjects);
            document.getElementById('urgencyFilter').addEventListener('change', loadProjects);
            document.getElementById('sortFilter').addEventListener('change', loadProjects);
        }

        function showMessage(text, type) {
            const div = document.getElementById('messageDiv');
            div.textContent = text;
            div.className = `message ${type}`;
            div.style.display = 'flex';
            setTimeout(() => div.style.display = 'none', 5000);
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.user-menu')) {
                document.getElementById('userDropdown')?.classList.remove('show');
            }
        });

        init();
    </script>

    <footer style="border-top: 1px solid var(--border); padding: 24px 0; margin-top: 40px; text-align: center; color: var(--text-light); font-size: 0.875rem;">
        <div class="container">
            <a href="/static/privacy.html" style="color: var(--text-light); margin: 0 12px;">Privacy & Data</a> ·
            <a href="mailto:uk@pauseai.info" style="color: var(--text-light); margin: 0 12px;">Contact</a> ·
            <span style="margin: 0 12px;">PauseAI UK</span>
        </div>
    </footer>
</body>
</html>
