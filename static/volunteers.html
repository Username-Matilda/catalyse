<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteers - Catalyse</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <header>
        <div class="container">
            <a href="/" class="logo">Catalyse <img src="/static/images/pauseai-logo.png" alt="PauseAI"></a>
            <nav>
                <a href="/">All Projects</a>
                <a href="/static/volunteers.html" class="active">Volunteers</a>
                <a href="/static/suggest.html">Suggest Project</a>
                <a href="/static/starter-tasks.html">Starter Tasks</a>
            </nav>
            <div class="nav-auth" id="authNav"></div>
        </div>
    </header>

    <main class="container page">
        <div class="section-header">
            <h1>Volunteer Directory</h1>
        </div>

        <div class="filters">
            <div class="filter-group">
                <label for="searchInput">Search</label>
                <input type="text" id="searchInput" placeholder="Search by name...">
            </div>
            <div class="filter-group">
                <label>Filter by Skill</label>
                <div class="location-filter" id="skillFilter"></div>
            </div>
            <div class="filter-group">
                <label>Location</label>
                <div class="location-filter" id="locationFilter"></div>
            </div>
            <div class="filter-group filter-group-clear">
                <button type="button" class="btn btn-small btn-ghost" onclick="clearFilters()">Clear filters</button>
            </div>
        </div>

        <div id="messageDiv" class="message" style="display: none;"></div>

        <div id="volunteersList" class="grid grid-3">
            <div class="loading">
                <div class="spinner"></div>
                Loading volunteers...
            </div>
        </div>

        <div id="emptyState" class="empty-state" style="display: none;">
            <h3>No volunteers found</h3>
            <p>Try adjusting your filters.</p>
        </div>
    </main>

    <script src="/static/app.js"></script>
    <script>
        let allVolunteers = [];
        let currentUser = null;
        let locationFilter = null;
        let skillFilter = null;

        async function init() {
            currentUser = await initAuthNav();
            if (!currentUser) {
                window.location.href = '/static/login.html';
                return;
            }
            skillFilter = createSelectFilter('skillFilter', [{ value: '', label: 'All Skills' }], loadVolunteers);
            locationFilter = createLocationFilter('locationFilter', loadVolunteers);
            await loadSkillsFilter();
            // Restore filters from URL
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('search')) document.getElementById('searchInput').value = urlParams.get('search');
            if (urlParams.get('skill_ids')) skillFilter.setValue(urlParams.get('skill_ids'));
            if (urlParams.get('country') || urlParams.get('local_group'))
                locationFilter.setValue(urlParams.get('country') || '', urlParams.get('local_group') || '');
            await loadVolunteers();
            setupFilters();
        }

        async function loadSkillsFilter() {
            try {
                const skills = await apiRequest('/api/skills/flat');
                const options = [{ value: '', label: 'All Skills' }];
                skills.forEach(skill => options.push({ value: String(skill.id), label: `${skill.name} (${skill.category_name})` }));
                skillFilter.setOptions(options);
            } catch (error) {
                console.error('Failed to load skills:', error);
            }
        }

        async function loadVolunteers() {
            // Save filters to URL
            const search = document.getElementById('searchInput').value;
            const skillId = skillFilter.getValue();
            const { country, localGroup } = locationFilter.getValue();
            const urlParams = new URLSearchParams();
            if (search) urlParams.set('search', search);
            if (skillId) urlParams.set('skill_ids', skillId);
            if (country) urlParams.set('country', country);
            if (localGroup) urlParams.set('local_group', localGroup);
            const newUrl = urlParams.toString() ? `?${urlParams}` : window.location.pathname;
            history.replaceState(null, '', newUrl);

            try {
                const params = new URLSearchParams();
                if (search) params.set('search', search);
                if (skillId) params.set('skill_ids', skillId);
                if (country) params.set('country', country);
                if (localGroup) params.set('local_group', localGroup);

                const data = await apiRequest(`/api/volunteers?${params}`);
                allVolunteers = data.volunteers;
                renderVolunteers();
            } catch (error) {
                showMessage(error.message, 'error');
            }
        }

        function renderVolunteers() {
            const container = document.getElementById('volunteersList');
            const emptyState = document.getElementById('emptyState');

            if (allVolunteers.length === 0) {
                container.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            container.innerHTML = allVolunteers.map(v => `
                <div class="card">
                    <h3 class="card-title" style="margin-bottom: 8px;">
                        <a href="/static/volunteer.html?id=${v.id}">${escapeHtml(v.name)}</a>
                    </h3>
                    ${v.location ? `<p class="card-meta">${escapeHtml(v.location)}</p>` : ''}
                    ${v.local_group ? `<p class="card-meta" style="margin-top: 0;">${escapeHtml(v.local_group)}</p>` : ''}
                    ${v.bio ? `<p class="card-description">${escapeHtml(truncate(v.bio, 100))}</p>` : ''}
                    <div class="skills">
                        ${v.skills.map(s => `<span class="skill-tag">${escapeHtml(s.name)}</span>`).join('')}
                    </div>
                    ${v.availability_hours_per_week ? `
                        <p style="font-size: 0.875rem; color: var(--text-light); margin-top: 12px;">
                            Available: ${v.availability_hours_per_week}h/week
                        </p>
                    ` : ''}
                    <div class="card-footer">
                        <span style="font-size: 0.875rem; color: var(--text-light);">Joined ${formatDate(v.created_at)}</span>
                        <a href="/static/volunteer.html?id=${v.id}" class="btn btn-small btn-outline">View Profile</a>
                    </div>
                </div>
            `).join('');
        }

        function setupFilters() {
            let debounceTimer;
            document.getElementById('searchInput').addEventListener('input', () => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(loadVolunteers, 300);
            });
        }

        function clearFilters() {
            document.getElementById('searchInput').value = '';
            skillFilter.setValue('');
            locationFilter.setValue('', '');
            loadVolunteers();
        }

        init();
    </script>
</body>
</html>
