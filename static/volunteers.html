<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteers - Catalyse</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <header>
        <div class="container">
            <a href="/" class="logo">Catalyse <img src="/static/images/pauseai-logo.png" alt="PauseAI"></a>
            <nav>
                <a href="/">Projects</a>
                <a href="/static/volunteers.html" class="active">Volunteers</a>
                <a href="/static/suggest.html">Suggest Project</a>
                <a href="/static/starter-tasks.html">Starter Tasks</a>
            </nav>
            <div class="nav-auth" id="authNav"></div>
        </div>
    </header>

    <main class="container page">
        <div class="section-header">
            <h1>Volunteer Directory</h1>
        </div>

        <div class="filters">
            <div class="filter-group">
                <label for="searchInput">Search</label>
                <input type="text" id="searchInput" placeholder="Search by name...">
            </div>
            <div class="filter-group" style="flex: 2;">
                <label for="skillFilter">Filter by Skill</label>
                <select id="skillFilter">
                    <option value="">All Skills</option>
                </select>
            </div>
        </div>

        <div id="messageDiv" class="message" style="display: none;"></div>

        <div id="volunteersList" class="grid grid-3">
            <div class="loading">
                <div class="spinner"></div>
                Loading volunteers...
            </div>
        </div>

        <div id="emptyState" class="empty-state" style="display: none;">
            <h3>No volunteers found</h3>
            <p>Try adjusting your filters.</p>
        </div>
    </main>

    <script src="/static/app.js"></script>
    <script>
        let allVolunteers = [];
        let currentUser = null;

        async function init() {
            currentUser = await initAuthNav();
            if (!currentUser) {
                window.location.href = '/static/login.html';
                return;
            }
            await loadSkillsFilter();
            await loadVolunteers();
            setupFilters();
        }

        async function loadSkillsFilter() {
            try {
                const skills = await apiRequest('/api/skills/flat');
                const select = document.getElementById('skillFilter');
                skills.forEach(skill => {
                    const option = document.createElement('option');
                    option.value = skill.id;
                    option.textContent = `${skill.name} (${skill.category_name})`;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Failed to load skills:', error);
            }
        }

        async function loadVolunteers() {
            try {
                const params = new URLSearchParams();
                const search = document.getElementById('searchInput').value;
                const skillId = document.getElementById('skillFilter').value;

                if (search) params.set('search', search);
                if (skillId) params.set('skill_ids', skillId);

                const data = await apiRequest(`/api/volunteers?${params}`);
                allVolunteers = data.volunteers;
                renderVolunteers();
            } catch (error) {
                showMessage(error.message, 'error');
            }
        }

        function renderVolunteers() {
            const container = document.getElementById('volunteersList');
            const emptyState = document.getElementById('emptyState');

            if (allVolunteers.length === 0) {
                container.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            container.innerHTML = allVolunteers.map(v => `
                <div class="card">
                    <h3 class="card-title" style="margin-bottom: 8px;">
                        <a href="/static/volunteer.html?id=${v.id}">${escapeHtml(v.name)}</a>
                    </h3>
                    ${v.location ? `<p class="card-meta">${escapeHtml(v.location)}</p>` : ''}
                    ${v.bio ? `<p class="card-description">${escapeHtml(truncate(v.bio, 100))}</p>` : ''}
                    <div class="skills">
                        ${v.skills.slice(0, 4).map(s => `<span class="skill-tag">${escapeHtml(s.name)}</span>`).join('')}
                        ${v.skills.length > 4 ? `<span class="skill-tag">+${v.skills.length - 4}</span>` : ''}
                    </div>
                    ${v.availability_hours_per_week ? `
                        <p style="font-size: 0.875rem; color: var(--text-light); margin-top: 12px;">
                            Available: ${v.availability_hours_per_week}h/week
                        </p>
                    ` : ''}
                    <div class="card-footer">
                        <span style="font-size: 0.875rem; color: var(--text-light);">Joined ${formatDate(v.created_at)}</span>
                        <a href="/static/volunteer.html?id=${v.id}" class="btn btn-small btn-outline">View Profile</a>
                    </div>
                </div>
            `).join('');
        }

        function setupFilters() {
            let debounceTimer;
            const debouncedLoad = () => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(loadVolunteers, 300);
            };

            document.getElementById('searchInput').addEventListener('input', debouncedLoad);
            document.getElementById('skillFilter').addEventListener('change', loadVolunteers);
        }

        init();
    </script>
</body>
</html>
