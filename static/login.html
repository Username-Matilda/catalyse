<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Catalyse</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <header>
        <div class="container">
            <a href="/" class="logo">Catalyse <img src="/static/images/pauseai-logo.png" alt="PauseAI"></a>
            <nav>
                <a href="/">Projects</a>
                <a href="/static/volunteers.html">Volunteers</a>
            </nav>
            <div class="nav-auth">
                <a href="/static/signup.html" class="btn btn-primary">Sign Up</a>
            </div>
        </div>
    </header>

    <main class="container page">
        <div style="max-width: 400px; margin: 60px auto;">
            <h1 style="text-align: center;">Welcome Back</h1>
            <p style="text-align: center; color: var(--text-light); margin-bottom: 32px;">
                Login to access your dashboard and projects.
            </p>

            <div id="messageDiv" class="message" style="display: none;"></div>

            <!-- Google Sign-In -->
            <div id="googleSignIn" class="card" style="display: none; text-align: center;">
                <div id="g_id_onload"
                     data-callback="handleGoogleSignIn"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin"
                     data-type="standard"
                     data-size="large"
                     data-theme="outline"
                     data-text="sign_in_with"
                     data-shape="rectangular"
                     data-logo_alignment="left"
                     data-width="350">
                </div>

                <div style="display: flex; align-items: center; margin: 20px 0; gap: 16px;">
                    <hr style="flex: 1; border: none; border-top: 1px solid var(--border);">
                    <span style="color: var(--text-light); font-size: 0.875rem;">or use email</span>
                    <hr style="flex: 1; border: none; border-top: 1px solid var(--border);">
                </div>
            </div>

            <form id="loginForm" class="card">
                <div class="form-group">
                    <label for="email" class="required">Email</label>
                    <input type="email" id="email" name="email" required placeholder="you@example.com" autofocus>
                </div>

                <div class="form-group">
                    <label for="password" class="required">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Your password">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    Login
                </button>

                <p style="text-align: center; margin-top: 16px;">
                    <a href="/static/forgot-password.html">Forgot your password?</a>
                </p>

                <p style="text-align: center; margin-top: 12px; color: var(--text-light);">
                    Don't have an account? <a href="/static/signup.html">Sign up</a>
                </p>
            </form>

            <p style="text-align: center; margin-top: 24px; font-size: 0.875rem; color: var(--text-light);">
                <a href="/static/privacy.html" style="color: var(--text-light);">Privacy Policy</a> ·
                <a href="mailto:matilda@pauseai.info" style="color: var(--text-light);">Contact Support</a>
            </p>
        </div>
    </main>

    <script src="/static/app.js"></script>
    <script>
        async function init() {
            const user = await getCurrentUser();
            if (user) {
                const redirect = getQueryParam('redirect') || '/static/dashboard.html';
                window.location.href = redirect;
            }

            // Initialize Google Sign-In if configured
            initGoogleSignIn();
        }

        async function initGoogleSignIn() {
            try {
                const config = await fetch('/api/auth/google-client-id').then(r => r.json());
                if (config.client_id) {
                    const onloadDiv = document.getElementById('g_id_onload');
                    onloadDiv.setAttribute('data-client_id', config.client_id);
                    document.getElementById('googleSignIn').style.display = 'block';

                    // Render the button (GSI library needs to re-process)
                    if (window.google?.accounts?.id) {
                        google.accounts.id.initialize({
                            client_id: config.client_id,
                            callback: handleGoogleSignIn
                        });
                        google.accounts.id.renderButton(
                            document.querySelector('.g_id_signin'),
                            { theme: 'outline', size: 'large', width: 350, text: 'sign_in_with' }
                        );
                    }
                }
            } catch (e) {
                // Google Sign-In not configured, just show password form
            }
        }

        async function handleGoogleSignIn(response) {
            try {
                const result = await fetch('/api/auth/google', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ credential: response.credential })
                });

                const data = await result.json().catch(() => ({ detail: 'Server error. Please try again.' }));

                if (!result.ok) {
                    throw new Error(data.detail || 'Google sign-in failed');
                }

                localStorage.setItem('authToken', data.auth_token);

                if (data.is_new_user) {
                    showMessage('Welcome to Catalyse! Please complete your profile.', 'success');
                    setTimeout(() => {
                        window.location.href = '/static/profile.html';
                    }, 1000);
                } else {
                    showMessage(data.message, 'success');
                    setTimeout(() => {
                        const redirect = getQueryParam('redirect') || '/static/dashboard.html';
                        window.location.href = redirect;
                    }, 500);
                }

            } catch (error) {
                showMessage(error.message, 'error');
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const form = e.target;
            const submitBtn = form.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Logging in...';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: form.email.value.trim(),
                        password: form.password.value
                    })
                });

                const result = await response.json().catch(() => ({ detail: 'Server error. Please try again.' }));

                if (!response.ok) {
                    const detail = Array.isArray(result.detail)
                        ? result.detail.map(e => e.msg).join(', ')
                        : result.detail;
                    throw new Error(detail || 'Login failed');
                }

                localStorage.setItem('authToken', result.auth_token);
                showMessage('Login successful!', 'success');

                setTimeout(() => {
                    const redirect = getQueryParam('redirect') || '/static/dashboard.html';
                    window.location.href = redirect;
                }, 500);

            } catch (error) {
                showMessage(error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Login';
            }
        });

        init();
    </script>
</body>
</html>
