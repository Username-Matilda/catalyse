<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - Catalyse</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <header>
        <div class="container">
            <a href="/" class="logo">Catalyse <img src="/static/images/pauseai-logo.png" alt="PauseAI"></a>
            <nav>
                <a href="/">All Projects</a>
                <a href="/static/volunteers.html">Volunteers</a>
                <a href="/static/suggest.html">Suggest Project</a>
                <a href="/static/starter-tasks.html">Starter Tasks</a>
            </nav>
            <div class="nav-auth" id="authNav"></div>
        </div>
    </header>

    <main class="container page">
        <div style="max-width: 700px; margin: 0 auto;">
            <h1>Edit Your Profile</h1>

            <div id="messageDiv" role="alert" class="message" style="display: none;"></div>

            <form id="profileForm" class="card">
                <div class="form-group">
                    <label for="name" class="required">Your Name</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="bio">About You</label>
                    <textarea id="bio" name="bio" placeholder="Tell us about yourself..."></textarea>
                </div>

                <h3 style="margin-top: 24px;">Contact Information</h3>

                <div class="grid grid-2">
                    <div class="form-group">
                        <label for="discord">Discord Handle</label>
                        <input type="text" id="discord" name="discord_handle" placeholder="username#1234">
                    </div>
                    <div class="form-group">
                        <label for="signal">Signal</label>
                        <input type="text" id="signal" name="signal_number" placeholder="+44...">
                    </div>
                    <div class="form-group">
                        <label for="whatsapp">WhatsApp</label>
                        <input type="text" id="whatsapp" name="whatsapp_number" placeholder="+44...">
                    </div>
                    <div class="form-group">
                        <label for="contact_preference">Preferred Contact Method</label>
                        <select id="contact_preference" name="contact_preference">
                            <option value="">Select...</option>
                            <option value="email">Email</option>
                            <option value="discord">Discord</option>
                            <option value="signal">Signal</option>
                            <option value="whatsapp">WhatsApp</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="contact_notes">Contact Notes</label>
                    <input type="text" id="contact_notes" name="contact_notes" placeholder="e.g., Best to DM me on Discord first">
                </div>

                <h3 style="margin-top: 24px;">Availability</h3>

                <div class="grid grid-2">
                    <div class="form-group">
                        <label for="availability">Hours per Week</label>
                        <input type="number" id="availability" name="availability_hours_per_week" min="1" max="40">
                    </div>
                    <div class="form-group">
                        <label for="location">Location</label>
                        <input type="text" id="location" name="location" placeholder="e.g., London, UK">
                    </div>
                    <div class="form-group">
                        <label for="country">Country</label>
                        <select id="country" name="country">
                            <option value="">Select...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="local_group">Local Group</label>
                        <select id="local_group" name="local_group">
                            <option value="">None / not in a local group</option>
                        </select>
                    </div>
                </div>

                <h3 style="margin-top: 24px;">Your Skills</h3>

                <div id="skillSelector" class="skill-selector">
                    <div class="loading"><div class="spinner"></div>Loading skills...</div>
                </div>

                <div class="form-group" style="margin-top: 16px;">
                    <label for="other_skills">Other Skills</label>
                    <input type="text" id="other_skills" name="other_skills" placeholder="Skills not listed above...">
                </div>

                <h3 style="margin-top: 24px;">Privacy Settings</h3>

                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="consent_make_profile_visible_in_directory" name="consent_make_profile_visible_in_directory">
                        <span>Make my profile visible in the volunteer directory</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="consent_contactable_by_project_owners" name="consent_contactable_by_project_owners">
                        <span>Allow project owners to contact me about opportunities</span>
                    </label>
                    <label class="checkbox-label" style="margin-left: 24px;">
                        <input type="checkbox" id="consent_share_contact_info_with_project_owner" name="consent_share_contact_info_with_project_owner">
                        <span>Share my contact info directly with project owners (otherwise they use the contact form)</span>
                    </label>
                </div>

                <h3 style="margin-top: 24px;">Email Notifications</h3>

                <div class="form-group">
                    <label for="email_digest">Keep me in the loop about new projects</label>
                    <select id="email_digest" name="email_digest">
                        <option value="none">Don't email me</option>
                        <option value="match">Email me when a project matches my skills</option>
                        <option value="fortnightly">Send me a fortnightly digest</option>
                    </select>
                </div>

                <div id="saveMessage" role="alert" class="message" style="display: none; margin-top: 24px;"></div>

                <div style="margin-top: 24px; display: flex; gap: 12px;">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <a href="/static/dashboard.html" class="btn btn-outline">Cancel</a>
                </div>
            </form>

            <div class="card" style="margin-top: 24px; border: 2px solid var(--border);">
                <h3>Data & Privacy</h3>
                <p style="color: var(--text-light); margin-bottom: 16px;">
                    Manage your data or delete your account.
                </p>
                <a href="/static/privacy.html" class="btn btn-outline">Privacy Settings</a>
            </div>
        </div>
    </main>

    <script src="/static/app.js"></script>
    <script>
        let currentUser = null;

        async function init() {
            currentUser = await initAuthNav();

            if (!currentUser) {
                window.location.href = '/static/login.html?redirect=/static/profile.html';
                return;
            }

            populateForm();
        }

        async function populateForm() {
            const form = document.getElementById('profileForm');

            // Basic info
            form.name.value = currentUser.name || '';
            form.bio.value = currentUser.bio || '';
            form.discord_handle.value = currentUser.discord_handle || '';
            form.signal_number.value = currentUser.signal_number || '';
            form.whatsapp_number.value = currentUser.whatsapp_number || '';
            form.contact_preference.value = currentUser.contact_preference || '';
            form.contact_notes.value = currentUser.contact_notes || '';
            form.availability_hours_per_week.value = currentUser.availability_hours_per_week || '';
            form.location.value = currentUser.location || '';
            renderCountrySelect('country', currentUser.country || '');
            renderLocalGroupSelect('local_group', currentUser.country || '', currentUser.local_group || '');
            form.other_skills.value = currentUser.other_skills || '';
            form.consent_make_profile_visible_in_directory.checked = currentUser.consent_make_profile_visible_in_directory !== false;
            form.consent_contactable_by_project_owners.checked = currentUser.consent_contactable_by_project_owners !== false;
            form.consent_share_contact_info_with_project_owner.checked = currentUser.consent_share_contact_info_with_project_owner || false;
            syncShareDirectly();
            form.email_digest.value = currentUser.email_digest || 'none';

            // Skills
            const selectedSkillIds = currentUser.skills?.map(s => s.id) || [];
            renderSkillSelector('skillSelector', selectedSkillIds);
        }

        // Keep share-directly sub-checkbox in sync with its parent
        const contactableCheckbox = document.getElementById('consent_contactable_by_project_owners');
        const shareDirectlyCheckbox = document.getElementById('consent_share_contact_info_with_project_owner');
        function syncShareDirectly() {
            shareDirectlyCheckbox.disabled = !contactableCheckbox.checked;
            if (!contactableCheckbox.checked) shareDirectlyCheckbox.checked = false;
        }
        contactableCheckbox.addEventListener('change', syncShareDirectly);
        syncShareDirectly();

        document.getElementById('country').addEventListener('change', (e) => {
            renderLocalGroupSelect('local_group', e.target.value);
        });

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const form = e.target;
            const submitBtn = form.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Saving...';

            try {
                const data = {
                    name: form.name.value.trim(),
                    bio: form.bio.value.trim() || null,
                    discord_handle: form.discord_handle.value.trim() || null,
                    signal_number: form.signal_number.value.trim() || null,
                    whatsapp_number: form.whatsapp_number.value.trim() || null,
                    contact_preference: form.contact_preference.value || null,
                    contact_notes: form.contact_notes.value.trim() || null,
                    availability_hours_per_week: form.availability_hours_per_week.value ? parseInt(form.availability_hours_per_week.value) : null,
                    location: form.location.value.trim() || null,
                    country: form.country.value || null,
                    local_group: form.local_group.value || null,
                    other_skills: form.other_skills.value.trim() || null,
                    consent_make_profile_visible_in_directory: form.consent_make_profile_visible_in_directory.checked,
                    consent_contactable_by_project_owners: form.consent_contactable_by_project_owners.checked,
                    consent_share_contact_info_with_project_owner: form.consent_share_contact_info_with_project_owner.checked,
                    email_digest: form.email_digest.value,
                    skill_ids: getSelectedSkills('skillSelector')
                };

                await apiRequest('/api/volunteers/me', {
                    method: 'PUT',
                    body: JSON.stringify(data)
                });

                showMessage('Profile updated!', 'success', 'saveMessage');
                // Also scroll the message into view to ensure visibility
                document.getElementById('saveMessage').scrollIntoView({ behavior: 'smooth', block: 'center' });

            } catch (error) {
                clearFieldErrors(form);
                showFieldErrors(error.fieldErrors, form);
                showMessage(error.message, 'error', 'saveMessage');
                document.getElementById('saveMessage').scrollIntoView({ behavior: 'smooth', block: 'center' });
            }

            submitBtn.disabled = false;
            submitBtn.textContent = 'Save Changes';
        });

        init();
    </script>
</body>
</html>
