<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stats - Catalyse Admin</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <header>
        <div class="container">
            <a href="/" class="logo"><img src="/static/images/pauseai-logo.png" alt="PauseAI"> Catalyse <span>Admin</span></a>
            <nav>
                <a href="/">Projects</a>
                <a href="/static/admin/triage.html">Triage</a>
                <a href="/static/admin/skills.html">Skills</a>
                <a href="/static/admin/starter-tasks.html">Starter Tasks</a>
                <a href="/static/admin/stats.html" class="active">Stats</a>
            </nav>
            <div class="nav-auth" id="authNav"></div>
        </div>
    </header>

    <main class="container page">
        <h1>Platform Statistics</h1>

        <div id="messageDiv" class="message" style="display: none;"></div>

        <div id="statsContent">
            <div class="loading">
                <div class="spinner"></div>
                Loading stats...
            </div>
        </div>
    </main>

    <script src="/static/app.js"></script>
    <script>
        async function init() {
            const currentUser = await initAuthNav();

            if (!currentUser || !currentUser.is_admin) {
                window.location.href = '/';
                return;
            }

            await loadStats();
        }

        async function loadStats() {
            try {
                const stats = await apiRequest('/api/admin/stats');
                renderStats(stats);
            } catch (error) {
                showMessage(error.message, 'error');
            }
        }

        function renderStats(stats) {
            document.getElementById('statsContent').innerHTML = `
                <div class="grid grid-2">
                    <div class="card">
                        <h2>Volunteers</h2>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 16px;">
                            <div>
                                <div style="font-size: 2.5rem; font-weight: bold; color: var(--primary);">
                                    ${stats.volunteers.total}
                                </div>
                                <div style="color: var(--text-light);">Total Registered</div>
                            </div>
                            <div>
                                <div style="font-size: 2.5rem; font-weight: bold; color: var(--success);">
                                    ${stats.volunteers.this_month}
                                </div>
                                <div style="color: var(--text-light);">Joined This Month</div>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <h2>Projects</h2>
                        <div style="margin-top: 16px;">
                            <div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border);">
                                <span>Total</span>
                                <strong>${stats.projects.total}</strong>
                            </div>
                            <div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border);">
                                <span style="color: var(--warning);">Pending Review</span>
                                <strong>${stats.projects.pending_review}</strong>
                            </div>
                            <div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border);">
                                <span style="color: var(--secondary);">Seeking Help</span>
                                <strong>${stats.projects.seeking_help}</strong>
                            </div>
                            <div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border);">
                                <span>In Progress</span>
                                <strong>${stats.projects.in_progress}</strong>
                            </div>
                            <div style="display: flex; justify-content: space-between; padding: 8px 0;">
                                <span style="color: var(--success);">Completed</span>
                                <strong>${stats.projects.completed}</strong>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <h2>Volunteer Interest</h2>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 16px;">
                            <div>
                                <div style="font-size: 2.5rem; font-weight: bold; color: var(--secondary);">
                                    ${stats.interests.total}
                                </div>
                                <div style="color: var(--text-light);">Total Interests</div>
                            </div>
                            <div>
                                <div style="font-size: 2.5rem; font-weight: bold; color: var(--warning);">
                                    ${stats.interests.pending}
                                </div>
                                <div style="color: var(--text-light);">Pending Response</div>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <h2>Quick Actions</h2>
                        <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 16px;">
                            <a href="/static/admin/triage.html" class="btn btn-outline" style="justify-content: flex-start;">
                                Review Pending Projects (${stats.projects.pending_review})
                            </a>
                            <a href="/static/admin/create-project.html" class="btn btn-outline" style="justify-content: flex-start;">
                                Create New Org Project
                            </a>
                            <a href="/static/volunteers.html" class="btn btn-outline" style="justify-content: flex-start;">
                                Browse Volunteers
                            </a>
                        </div>
                    </div>
                </div>
            `;
        }

        init();
    </script>
</body>
</html>
