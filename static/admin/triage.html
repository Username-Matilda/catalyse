<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Triage - Catalyse Admin</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <header>
        <div class="container">
            <a href="/" class="logo">Catalyse <img src="/static/images/pauseai-logo.png" alt="PauseAI"> <span>Admin</span></a>
            <nav>
                <a href="/">All Projects</a>
                <a href="/static/admin/triage.html" class="active">Triage</a>
                <a href="/static/admin/skills.html">Skills</a>
                <a href="/static/admin/starter-tasks.html">Starter Tasks</a>
                <a href="/static/admin/bugs.html">Bug Reports</a>
                <a href="/static/admin/team.html">Team</a>
                <a href="/static/admin/stats.html">Stats</a>
            </nav>
            <div class="nav-auth" id="authNav"></div>
        </div>
    </header>

    <main class="container page">
        <div class="section-header">
            <h1>Project Triage</h1>
            <a href="/static/admin/create-project.html" class="btn btn-primary">Create Org Project</a>
        </div>

        <p style="color: var(--text-light); margin-bottom: 24px;">
            Review and approve volunteer-proposed projects before they go live.
        </p>

        <div id="messageDiv" class="message" style="display: none;"></div>

        <div class="tabs-wrapper">
            <div class="tabs">
                <button class="tab active" data-tab="pending">Pending Review</button>
                <button class="tab" data-tab="discussion">Needs Discussion</button>
                <button class="tab" data-tab="interests">Volunteer Interests <span id="interestBadge" class="notification-badge" style="display: none;"></span></button>
            </div>
        </div>

        <div id="tab-pending" class="tab-content">
            <div id="pendingList">
                <div class="loading">
                    <div class="spinner"></div>
                    Loading...
                </div>
            </div>
        </div>

        <div id="tab-discussion" class="tab-content" style="display: none;">
            <div id="discussionList"></div>
        </div>

        <div id="tab-interests" class="tab-content" style="display: none;">
            <div class="filters" style="margin-bottom: 16px;">
                <div class="filter-group">
                    <label for="interestStatusFilter">Status</label>
                    <select id="interestStatusFilter">
                        <option value="pending">Pending</option>
                        <option value="">All</option>
                        <option value="accepted">Accepted</option>
                        <option value="declined">Declined</option>
                        <option value="withdrawn">Withdrawn</option>
                    </select>
                </div>
            </div>
            <div id="interestsList"></div>
        </div>

        <div id="emptyState" class="empty-state" style="display: none;">
            <h3>All caught up!</h3>
            <p>No projects awaiting review.</p>
        </div>
    </main>

    <!-- Review Modal -->
    <div id="reviewModal" class="modal-overlay" style="display: none;">
        <div class="modal" style="max-width: 600px;">
            <div class="modal-header">
                <h2>Review Project</h2>
                <button class="modal-close" onclick="closeModal('reviewModal')">&times;</button>
            </div>
            <div class="modal-body">
                <h3 id="reviewProjectTitle"></h3>
                <p id="reviewProjectDescription" style="white-space: pre-wrap; margin: 16px 0; max-height: 200px; overflow-y: auto;"></p>

                <form id="reviewForm">
                    <input type="hidden" id="reviewProjectId">

                    <div class="form-group">
                        <label class="required">Decision</label>
                        <div class="checkbox-group">
                            <label class="checkbox-label">
                                <input type="radio" name="decision" value="approved" checked>
                                <span><strong>Approve</strong> - Make visible to volunteers</span>
                            </label>
                            <label class="checkbox-label">
                                <input type="radio" name="decision" value="needs_discussion">
                                <span><strong>Needs Discussion</strong> - Reach out to proposer</span>
                            </label>
                        </div>
                    </div>

                    <div id="approveOptions">
                        <div class="form-group">
                            <label>Initial Status</label>
                            <select id="targetStatus">
                                <option value="seeking_owner">Seeking Owner</option>
                                <option value="seeking_help">Seeking Help (if owner already assigned)</option>
                            </select>
                        </div>
                    </div>

                    <div id="discussionOptions" style="display: none;">
                        <div class="form-group">
                            <label for="feedback">Message to Proposer</label>
                            <textarea id="feedback" placeholder="Let them know what you'd like to discuss or clarify..."></textarea>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="reviewNotes">Internal Notes (not shared)</label>
                        <textarea id="reviewNotes" placeholder="Notes for other admins..."></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary">Submit Review</button>
                </form>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
    <script>
        let currentUser = null;
        let pendingProjects = [];
        let discussionProjects = [];

        async function init() {
            currentUser = await initAuthNav();

            if (!currentUser || !currentUser.is_admin) {
                window.location.href = '/';
                return;
            }

            await Promise.all([loadTriageQueue(), loadInterests()]);
            setupTabs();
            setupReviewForm();
            document.getElementById('interestStatusFilter').addEventListener('change', loadInterests);
        }

        async function loadTriageQueue() {
            try {
                const projects = await apiRequest('/api/admin/triage');
                pendingProjects = projects.filter(p => p.status === 'pending_review');
                discussionProjects = projects.filter(p => p.status === 'needs_discussion');

                renderLists();
            } catch (error) {
                showMessage(error.message, 'error');
            }
        }

        function renderLists() {
            renderProjectList('pendingList', pendingProjects);
            renderProjectList('discussionList', discussionProjects);

            const emptyState = document.getElementById('emptyState');
            if (pendingProjects.length === 0 && discussionProjects.length === 0) {
                emptyState.style.display = 'block';
            } else {
                emptyState.style.display = 'none';
            }
        }

        function renderProjectList(containerId, projects) {
            const container = document.getElementById(containerId);

            if (projects.length === 0) {
                container.innerHTML = '<p style="color: var(--text-light); padding: 20px;">No projects in this category.</p>';
                return;
            }

            container.innerHTML = projects.map(p => `
                <div class="card">
                    <div class="card-header">
                        <div>
                            <h3 class="card-title">${escapeHtml(p.title)}</h3>
                            <p class="card-meta">
                                Proposed by: ${p.proposer_name ? escapeHtml(p.proposer_name) : 'Unknown'}
                                · ${formatDate(p.created_at)}
                                ${p.project_type ? ` · ${{sprint:'Sprint',container:'Time-boxed',ongoing:'Ongoing',one_off:'One-off'}[p.project_type] || p.project_type}` : ''}
                                ${p.time_commitment_hours_per_week ? ` · ${p.time_commitment_hours_per_week}h/week` : ''}
                                ${p.estimated_duration ? ` · ${p.estimated_duration}` : ''}
                            </p>
                        </div>
                        <span class="status-badge status-${p.status}">${formatStatus(p.status)}</span>
                    </div>
                    <p style="white-space: pre-wrap; margin: 12px 0;">${escapeHtml(truncate(p.description, 300))}</p>
                    <div class="skills">
                        ${p.skills.map(s => `<span class="skill-tag ${s.is_required ? 'required' : ''}">${escapeHtml(s.name)}</span>`).join('')}
                    </div>
                    ${p.feedback_to_proposer ? `
                        <div class="message warning" style="margin-top: 12px;">
                            <strong>Previous feedback:</strong> ${escapeHtml(p.feedback_to_proposer)}
                        </div>
                    ` : ''}
                    <div class="card-footer">
                        <span class="urgency urgency-${p.urgency}">${formatUrgency(p.urgency)} priority</span>
                        <button class="btn btn-small btn-primary" onclick="openReview(${p.id})">Review</button>
                    </div>
                </div>
            `).join('');
        }

        function openReview(projectId) {
            const project = [...pendingProjects, ...discussionProjects].find(p => p.id === projectId);
            if (!project) return;

            document.getElementById('reviewProjectId').value = project.id;
            document.getElementById('reviewProjectTitle').textContent = project.title;
            document.getElementById('reviewProjectDescription').textContent = project.description;

            // Reset form
            document.querySelector('input[name="decision"][value="approved"]').checked = true;
            document.getElementById('targetStatus').value = project.owner_id ? 'seeking_help' : 'seeking_owner';
            document.getElementById('feedback').value = '';
            document.getElementById('reviewNotes').value = project.review_notes || '';

            toggleDecisionOptions();
            openModal('reviewModal');
        }

        function toggleDecisionOptions() {
            const decision = document.querySelector('input[name="decision"]:checked').value;
            document.getElementById('approveOptions').style.display = decision === 'approved' ? 'block' : 'none';
            document.getElementById('discussionOptions').style.display = decision === 'needs_discussion' ? 'block' : 'none';
        }

        function setupReviewForm() {
            document.querySelectorAll('input[name="decision"]').forEach(radio => {
                radio.addEventListener('change', toggleDecisionOptions);
            });

            document.getElementById('reviewForm').addEventListener('submit', async (e) => {
                e.preventDefault();

                const projectId = document.getElementById('reviewProjectId').value;
                const decision = document.querySelector('input[name="decision"]:checked').value;
                const btn = e.target.querySelector('button[type="submit"]');
                btn.disabled = true;

                try {
                    const data = {
                        status: decision,
                        review_notes: document.getElementById('reviewNotes').value.trim() || null
                    };

                    if (decision === 'approved') {
                        data.target_status = document.getElementById('targetStatus').value;
                    } else {
                        data.feedback_to_proposer = document.getElementById('feedback').value.trim() || null;
                    }

                    await apiRequest(`/api/admin/projects/${projectId}/review`, {
                        method: 'POST',
                        body: JSON.stringify(data)
                    });

                    closeModal('reviewModal');
                    showMessage(`Project ${decision === 'approved' ? 'approved' : 'marked for discussion'}!`, 'success');
                    await loadTriageQueue();

                } catch (error) {
                    showMessage(error.message, 'error');
                }

                btn.disabled = false;
            });
        }

        async function loadInterests() {
            const status = document.getElementById('interestStatusFilter').value;
            const params = status ? `?status=${status}` : '';

            try {
                const interests = await apiRequest(`/api/admin/interests${params}`);
                const container = document.getElementById('interestsList');

                // Update badge count for pending
                const pendingCount = status === 'pending' ? interests.length : null;
                if (pendingCount !== null && pendingCount > 0) {
                    const badge = document.getElementById('interestBadge');
                    badge.textContent = pendingCount;
                    badge.style.display = 'inline';
                }

                if (interests.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <p>No ${status || ''} interests found.</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = interests.map(i => `
                    <div class="card" style="${i.status === 'pending' ? 'border-left: 4px solid var(--primary);' : ''}">
                        <div class="card-header">
                            <div>
                                <h3 class="card-title">
                                    <a href="/static/volunteer.html?id=${i.volunteer_id}">${escapeHtml(i.volunteer_name)}</a>
                                    <span style="font-weight: normal; font-size: 0.875rem; color: var(--text-light);">
                                        wants to ${i.interest_type === 'want_to_own' ? 'own' : 'contribute to'}
                                    </span>
                                    <a href="/static/project.html?id=${i.project_id}">${escapeHtml(i.project_title)}</a>
                                </h3>
                                <p class="card-meta">
                                    ${formatDate(i.created_at)}
                                    ${i.owner_name ? ` · Owner: ${escapeHtml(i.owner_name)}` : ' · No owner yet'}
                                    · Project: <span class="status-badge status-${i.project_status}">${formatStatus(i.project_status)}</span>
                                </p>
                            </div>
                            <span class="status-badge status-${i.status === 'pending' ? 'seeking_help' : i.status === 'accepted' ? 'completed' : 'on_hold'}">
                                ${i.status}
                            </span>
                        </div>
                        ${i.message ? `<p style="margin: 8px 0; font-style: italic; color: var(--text-light);">"${escapeHtml(i.message)}"</p>` : ''}
                        <div class="skills" style="margin: 8px 0;">
                            ${(i.volunteer_skills || []).map(s => `<span class="skill-tag">${escapeHtml(s.name)}</span>`).join('')}
                        </div>
                        ${i.status === 'pending' ? `
                            <div style="display: flex; gap: 8px; margin-top: 8px;">
                                <button class="btn btn-small btn-primary" onclick="respondInterest(${i.project_id}, ${i.id}, 'accepted')">Accept</button>
                                <button class="btn btn-small btn-outline" onclick="respondInterest(${i.project_id}, ${i.id}, 'declined')">Decline</button>
                                <a href="/static/project.html?id=${i.project_id}" class="btn btn-small btn-ghost">View Project</a>
                            </div>
                        ` : ''}
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('interestsList').innerHTML = `<p class="error">${error.message}</p>`;
                showToast(error.message, 'error');
            }
        }

        async function respondInterest(projectId, interestId, status) {
            const message = status === 'declined'
                ? prompt('Optional message to volunteer:')
                : null;

            try {
                await apiRequest(`/api/projects/${projectId}/interest/${interestId}`, {
                    method: 'PUT',
                    body: JSON.stringify({ status, response_message: message })
                });
                showMessage(`Interest ${status}.`, 'success');
                await loadInterests();
            } catch (error) {
                showMessage(error.message, 'error');
            }
        }

        function setupTabs() {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');

                    document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
                    document.getElementById(`tab-${tab.dataset.tab}`).style.display = 'block';
                });
            });

            // Auto-switch to tab if URL hash matches (e.g. #interests)
            const hash = window.location.hash.replace('#', '');
            if (hash) {
                const targetTab = document.querySelector(`.tab[data-tab="${hash}"]`);
                if (targetTab) targetTab.click();
            }
        }

        init();
    </script>
</body>
</html>
